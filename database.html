<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posen Back Office - データベース閲覧</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .db-container {
            display: flex;
            gap: 0;
            height: calc(100vh - 4rem);
            background: #f8fafc;
        }

        /* 左パネル：テーブル一覧 */
        .db-sidebar {
            width: 220px;
            background: #1e293b;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            border-radius: 12px 0 0 12px;
            overflow: hidden;
        }

        .db-sidebar-header {
            padding: 1rem;
            background: #0f172a;
            color: #94a3b8;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .db-table-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .db-table-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: none;
            background: none;
            color: #94a3b8;
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s;
            text-align: left;
        }

        .db-table-btn:hover {
            background: rgba(255, 255, 255, 0.07);
            color: #e2e8f0;
        }

        .db-table-btn.active {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .db-table-btn .table-icon {
            font-size: 0.65rem;
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            padding: 2px 5px;
            border-radius: 3px;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .db-table-btn.active .table-icon {
            background: rgba(59, 130, 246, 0.3);
        }

        /* 右パネル：データビュー */
        .db-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: white;
            border-radius: 0 12px 12px 0;
            border: 1px solid #e2e8f0;
            border-left: none;
            overflow: hidden;
        }

        /* ツールバー */
        .db-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.875rem 1.25rem;
            border-bottom: 1px solid #e2e8f0;
            background: #fff;
            gap: 1rem;
            flex-shrink: 0;
        }

        .db-table-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 0.95rem;
            font-weight: 700;
            color: #1e293b;
        }

        .db-schema-badge {
            font-size: 0.7rem;
            background: #f1f5f9;
            color: #64748b;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: sans-serif;
            font-weight: 600;
        }

        .db-row-count {
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 500;
            font-family: sans-serif;
        }

        .db-toolbar-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .db-search {
            position: relative;
        }

        .db-search input {
            padding: 6px 12px 6px 32px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.8rem;
            width: 220px;
            outline: none;
            transition: border-color 0.2s;
            color: #334155;
        }

        .db-search input:focus {
            border-color: #3b82f6;
        }

        .db-search i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .btn-csv {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 6px 14px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-csv:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }

        /* テーブル */
        .db-table-wrapper {
            flex: 1;
            overflow: auto;
        }

        .db-data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        .db-data-table th {
            position: sticky;
            top: 0;
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            padding: 10px 16px;
            text-align: left;
            font-size: 0.72rem;
            font-weight: 700;
            color: #64748b;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: background 0.1s;
        }

        .db-data-table th:hover {
            background: #f1f5f9;
        }

        .db-data-table th .sort-icon {
            opacity: 0.4;
            margin-left: 4px;
        }

        .db-data-table th.sort-asc .sort-icon,
        .db-data-table th.sort-desc .sort-icon {
            opacity: 1;
            color: #3b82f6;
        }

        .db-data-table td {
            padding: 9px 16px;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 0.78rem;
            white-space: nowrap;
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .db-data-table tr:hover td {
            background: #f8fafc;
        }

        .db-data-table td.null-value {
            color: #cbd5e1;
            font-style: italic;
        }

        /* ステータスバッジ */
        .db-badge {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 99px;
            font-size: 0.7rem;
            font-weight: 600;
            font-family: sans-serif;
        }

        .db-badge.active {
            background: #dcfce7;
            color: #16a34a;
        }

        .db-badge.inactive {
            background: #fee2e2;
            color: #dc2626;
        }

        .db-badge.expired {
            background: #fef3c7;
            color: #d97706;
        }

        .db-badge.pending {
            background: #e0e7ff;
            color: #4338ca;
        }

        /* フッター */
        .db-footer {
            padding: 0.6rem 1.25rem;
            border-top: 1px solid #f1f5f9;
            background: #fcfcfd;
            font-size: 0.75rem;
            color: #94a3b8;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-shrink: 0;
        }

        .db-footer span {
            font-weight: 600;
            color: #64748b;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div id="sidebar-container"></div>

        <main class="main-content" style="padding: 0; display: flex; flex-direction: column;">
            <!-- ページヘッダー -->
            <div style="padding: 1.5rem 2rem 1rem; flex-shrink: 0;">
                <div class="flex justify-between items-center">
                    <div>
                        <h1 class="text-2xl font-bold mb-1" style="display:flex; align-items:center; gap:0.5rem;">
                            <i data-lucide="database" width="24" style="color:#3b82f6;"></i> データベース閲覧
                        </h1>
                        <p class="text-muted text-sm">読み取り専用 (Read-only) ・ ダミーデータ表示中</p>
                    </div>
                    <div
                        style="background:#fef9c3; border:1px solid #fde68a; border-radius:8px; padding:8px 14px; font-size:0.8rem; color:#92400e; display:flex; align-items:center; gap:0.5rem;">
                        <i data-lucide="lock" width="14"></i> 読み取り専用モード
                    </div>
                </div>
            </div>

            <!-- DBビューア本体 -->
            <div style="padding: 0 2rem 1.5rem; flex: 1; min-height: 0;">
                <div class="db-container">
                    <!-- 左：テーブル一覧 -->
                    <div class="db-sidebar">
                        <div class="db-sidebar-header">
                            <i data-lucide="database" width="14"></i> posen_db
                        </div>
                        <div class="db-table-list">
                            <div
                                style="padding: 8px 8px 4px; font-size:0.65rem; color:#475569; letter-spacing:0.08em; text-transform:uppercase; font-weight:700;">
                                Tables</div>
                            <button class="db-table-btn active" onclick="loadTable('clinics', this)">
                                <span class="table-icon">TBL</span> clinics
                            </button>
                            <button class="db-table-btn" onclick="loadTable('users', this)">
                                <span class="table-icon">TBL</span> users
                            </button>
                            <button class="db-table-btn" onclick="loadTable('customers', this)">
                                <span class="table-icon">TBL</span> customers
                            </button>
                            <button class="db-table-btn" onclick="loadTable('contracts', this)">
                                <span class="table-icon">TBL</span> contracts
                            </button>
                            <button class="db-table-btn" onclick="loadTable('invoices', this)">
                                <span class="table-icon">TBL</span> invoices
                            </button>
                            <button class="db-table-btn" onclick="loadTable('activity_logs', this)">
                                <span class="table-icon">TBL</span> activity_logs
                            </button>
                        </div>
                    </div>

                    <!-- 右：データビュー -->
                    <div class="db-main">
                        <!-- ツールバー -->
                        <div class="db-toolbar">
                            <div style="display:flex; align-items:center; gap:0.75rem;">
                                <div class="db-table-title">
                                    <i data-lucide="table-2" width="16" style="color:#3b82f6;"></i>
                                    <span id="db-table-name">clinics</span>
                                    <span class="db-schema-badge">posen_db</span>
                                </div>
                                <span class="db-row-count" id="db-row-count"></span>
                            </div>
                            <div class="db-toolbar-actions">
                                <div class="db-search">
                                    <i data-lucide="search" width="14"></i>
                                    <input type="text" id="db-search-input" placeholder="検索..." oninput="filterTable()">
                                </div>
                                <button class="btn-csv" onclick="downloadCSV()">
                                    <i data-lucide="download" width="14"></i> CSV出力
                                </button>
                            </div>
                        </div>

                        <!-- テーブルデータ -->
                        <div class="db-table-wrapper">
                            <table class="db-data-table">
                                <thead id="db-thead"></thead>
                                <tbody id="db-tbody"></tbody>
                            </table>
                        </div>

                        <!-- フッター -->
                        <div class="db-footer">
                            <span id="db-footer-showing"></span> 件表示
                            <span style="margin-left:auto; font-size:0.7rem; color:#cbd5e1;">READ ONLY • posen_db</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ===== ダミーデータ =====
        const tables = {
            clinics: {

                    ['5', 'USR005', '青山渋谷-01', 'CL002', 'admin', 'shibuya01@aoyama.example', 'active', '2025-12-31', '2024-02-15 08:50'],
                    ['6', 'USR006', '青山渋谷-02', 'CL002', 'staff', 'shibuya02@aoyama.example', 'active', '2025-12-31', '2024-02-12 10:15'],
                    ['7', 'USR007', 'サンプル新宿-01', 'CL003', 'admin', 'shinjuku01@sample.example', 'active', '2025-06-30', '2024-02-10 13:45'],
                    ['8', 'USR008', 'さくら整形-01', 'CL006', 'admin', 'sakura01@sakura.example', 'active', '2025-12-31', '2024-02-15 10:00'],
                ]
            },
            customers: {
                columns: ['id', 'customer_code', 'name', 'representative', 'phone', 'email', 'plan', 'status', 'clinic_count', 'created_at'],
                rows: [
                    ['1', 'CUST001', '医療法人社団 青山会', '青山 隆志', '03-1234-5678', 'info@aoyama.example', '基本機能', 'active', '2', '2022-04-01'],
                    ['2', 'CUST002', '美容外科 サンプル院', '佐藤 美穂', '03-9876-5432', 'info@sample.example', '基本機能', 'active', '2', '2023-06-01'],
                    ['3', 'CUST003', '山田皮膚科', '山田 浩二', '06-1234-9876', 'info@yamada.example', 'スタンダード', 'active', '1', '2023-09-10'],
                    ['4', 'CUST004', 'さくら医療グループ', '木村 花子', '03-5555-1234', 'info@sakura.example', '基本機能', 'active', '1', '2022-11-20'],
                    ['5', 'CUST005', 'ひまわりメディカル', '田中 慎一', '045-987-6543', 'info@himawari.example', 'プレミアム', 'active', '1', '2022-07-01'],
                    ['6', 'CUST006', '東京スキンケア', '中村 貴大', '03-3333-4444', 'info@tokyoskin.example', 'スタンダード', 'inactive', '1', '2021-04-01'],
                ]
            },
            contracts: {
                columns: ['id', 'customer_id', 'plan_name', 'monthly_fee', 'start_date', 'end_date', 'auto_renew', 'status', 'sales_rep'],
                rows: [
                    ['1', 'CUST001', '基本機能プラン', '55000', '2022-04-01', '2025-03-31', 'true', 'active', '田中 健太'],
                    ['2', 'CUST002', '基本機能プラン', '44000', '2023-06-01', '2024-05-31', 'true', 'active', '鈴木 咲'],
                    ['3', 'CUST003', 'スタンダードプラン', '88000', '2023-09-01', '2024-08-31', 'false', 'active', '田中 健太'],
                    ['4', 'CUST004', '基本機能プラン', '44000', '2022-11-01', '2024-10-31', 'true', 'active', '山本 大輔'],
                    ['5', 'CUST005', 'プレミアムプラン', '165000', '2022-07-01', '2025-06-30', 'true', 'active', '鈴木 咲'],
                    ['6', 'CUST006', 'スタンダードプラン', '88000', '2021-04-01', '2023-03-31', 'false', 'inactive', '田中 健太'],
                ]
            },
            invoices: {
                columns: ['id', 'invoice_no', 'customer_id', 'billing_date', 'due_date', 'amount_excl_tax', 'tax', 'amount_incl_tax', 'paid_date', 'status'],
                rows: [
                    ['1', 'INV-2024-0215', 'CUST001', '2024-02-01', '2024-02-28', '50000', '5000', '55000', '2024-02-12', 'paid'],
                    ['2', 'INV-2024-0115', 'CUST001', '2024-01-01', '2024-01-31', '50000', '5000', '55000', '2024-01-10', 'paid'],
                    ['3', 'INV-2024-0210', 'CUST002', '2024-02-01', '2024-02-28', '40000', '4000', '44000', 'NULL', 'pending'],
                    ['4', 'INV-2024-0205', 'CUST003', '2024-02-01', '2024-02-28', '80000', '8000', '88000', '2024-02-08', 'paid'],
                    ['5', 'INV-2024-0110', 'CUST004', '2024-01-01', '2024-01-31', '40000', '4000', '44000', '2024-01-15', 'paid'],
                    ['6', 'INV-2024-0208', 'CUST005', '2024-02-01', '2024-02-28', '150000', '15000', '165000', 'NULL', 'pending'],
                    ['7', 'INV-2024-0108', 'CUST005', '2024-01-01', '2024-01-31', '150000', '15000', '165000', '2024-01-08', 'paid'],

                ]
            },
            activity_logs: {
                columns: ['id', 'customer_id', 'log_type', 'title', 'content', 'staff', 'created_at'],
                rows: [
                    ['10', 'CUST001', 'memo', '社内メモ追加', '来月の更新に向けて、利用状況のヒアリングを実施する予定。', '田中 健太', '2024-02-15 14:00'],
                    ['11', 'CUST001', 'system', '入金確認', '2024年1月分の入金を確認しました。（¥55,000）', 'SYSTEM', '2024-02-10 10:15'],
                    ['12', 'CUST003', 'system', '利用プラン変更', '月額プランから一括プランへ変更されました。', 'SYSTEM', '2024-02-05 09:30'],
                    ['13', 'CUST001', 'comment', 'コメント追加', '顧客より、新しいユーザー様向けの操作勉強会の依頼がありました。', '鈴木 咲', '2024-01-20 16:30'],
                    ['14', 'CUST002', 'system', '新規ユーザー作成', '「新宿院-01」アカウントが作成されました。', 'SYSTEM', '2024-01-18 11:00'],
                    ['15', 'CUST001', 'system', '部門追加', 'CL002 (青山美容クリニック 渋谷院) を追加しました。', 'SYSTEM', '2024-01-14 10:30'],
                    ['16', 'CUST002', 'memo', 'クレーム対応', 'ログイン時のエラーについて問い合わせがありました。対応完了し報告済みです。', '田中 健太', '2023-12-25 15:45'],
                ]
            }
        };

        // ===== 状態管理 =====
        let currentTable = 'clinics';
        let currentData = [];
        let sortCol = -1;
        let sortAsc = true;

        // ===== テーブル読み込み =====
        function loadTable(tableName, btn) {
            currentTable = tableName;
            document.querySelectorAll('.db-table-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('db-table-name').textContent = tableName;
            document.getElementById('db-search-input').value = '';
            sortCol = -1;
            sortAsc = true;
            renderTable();
        }

        function renderTable(filtered) {
            const tbl = tables[currentTable];
            currentData = filtered || tbl.rows;

            // ヘッダー
            const thead = document.getElementById('db-thead');
            thead.innerHTML = '<tr>' + tbl.columns.map((col, i) => `
                <th onclick="sortByCol(${i})" class="${sortCol === i ? (sortAsc ? 'sort-asc' : 'sort-desc') : ''}">
                    ${col}
                    <span class="sort-icon">${sortCol === i ? (sortAsc ? '↑' : '↓') : '↕'}</span>
                </th>
            `).join('') + '</tr>';

            // ボディ
            const tbody = document.getElementById('db-tbody');
            if (currentData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${tbl.columns.length}" style="text-align:center; color:#94a3b8; padding:40px;">該当するレコードが見つかりません</td></tr>`;
            } else {
                tbody.innerHTML = currentData.map(row =>
                    '<tr>' + row.map((cell, i) => {
                        if (cell === 'NULL') return '<td class="null-value">NULL</td>';
                        if (tbl.columns[i] === 'status') {
                            const cls = { active: 'active', inactive: 'inactive', expired: 'expired', pending: 'pending', paid: 'active', overdue: 'inactive', overdue: 'inactive' }[cell] || '';
                            const label = { active: '有効', inactive: '無効', expired: '期限切れ', pending: '未払い', paid: '入金済', overdue: '期限超過' }[cell] || cell;
                            return `<td><span class="db-badge ${cls}">${label}</span></td>`;
                        }
                        return `<td title="${cell}">${cell}</td>`;
                    }).join('') + '</tr>'
                ).join('');
            }

            const total = tbl.rows.length;
            document.getElementById('db-row-count').textContent = filtered ? `${filtered.length} / ${total} 件` : `${total} 件`;
            document.getElementById('db-footer-showing').textContent = `${currentData.length}`;

            lucide.createIcons();
        }

        // ===== 検索フィルター =====
        function filterTable() {
            const q = document.getElementById('db-search-input').value.toLowerCase();
            if (!q) {
                renderTable();
                return;
            }
            const filtered = tables[currentTable].rows.filter(row =>
                row.some(cell => cell.toLowerCase().includes(q))
            );
            renderTable(filtered);
        }

        // ===== ソート =====
        function sortByCol(colIndex) {
            if (sortCol === colIndex) {
                sortAsc = !sortAsc;
            } else {
                sortCol = colIndex;
                sortAsc = true;
            }
            const sorted = [...currentData].sort((a, b) => {
                const av = a[colIndex], bv = b[colIndex];
                const cmp = av.localeCompare(bv, 'ja', { numeric: true });
                return sortAsc ? cmp : -cmp;
            });
            renderTable(sorted);
        }

        // ===== CSV出力 =====
        function downloadCSV() {
            const tbl = tables[currentTable];
            const header = tbl.columns.join(',');
            const rows = currentData.map(row => row.map(cell => `"${cell}"`).join(','));
            const csv = [header, ...rows].join('\n');
            const bom = '\uFEFF';
            const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentTable}_${new Date().toISOString().slice(0, 10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ===== 初期化 =====
        lucide.createIcons();
        renderTable();
    </script>
    <script src="js/sidebar.js"></script>
</body>
